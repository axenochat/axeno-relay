name: Release

# Builds and publishes the relay binary for every supported OS when a version
# tag is pushed.
#
#   git tag v0.2.0 && git push origin v0.2.0
#
# Produces, on a single GitHub Release, relay binaries for:
#   - Linux  x86_64, aarch64
#   - macOS  x86_64, aarch64
#   - Windows x86_64, aarch64
#
# Asset names are stable and versionless (axeno-relay-<os>-<arch>.tar.gz / .zip)
# so scripts/setup-relay.* can fetch them from releases/latest/download/.
#
# Each build job uploads its binary as a workflow artifact; a single final job
# collects them and creates the (draft) release. Nothing but that final job
# touches the release, so parallel jobs cannot race on it. Publish the draft to
# make the setup scripts work.
#
# ARM targets build on GitHub's native ARM runners (free for public repos).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# Only one release run per tag at a time; a newer push cancels an older run.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64 (tar.gz)
            slug: linux-x86_64
            platform: ubuntu-22.04
            target: ""
          - name: Linux Arm64 (tar.gz)         # Raspberry Pi 64-bit, ARM servers
            slug: linux-aarch64
            platform: ubuntu-22.04-arm
            target: ""
          - name: Macos Intel (tar.gz)         # cross-compiled from the arm64 runner
            slug: macos-x86_64
            platform: macos-latest
            target: x86_64-apple-darwin
          - name: Macos Arm (tar.gz)
            slug: macos-aarch64
            platform: macos-latest
            target: aarch64-apple-darwin
          - name: Windows x64 (zip)
            slug: windows-x86_64
            platform: windows-latest
            target: ""
          - name: Windows Arm64 (zip)
            slug: windows-aarch64
            platform: windows-11-arm
            target: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev pkg-config

      # protoc is needed by libsignal's spqr crate (prost-build) on every OS.
      # Use the maintained, token-authenticated action wherever protobuf ships a
      # native build (avoids the GitHub release CDN 504s/rate limits that broke the
      # manual Windows download). Covers Linux x64/arm64, macOS x64/arm64, Win x64.
      - name: Install protoc
        if: matrix.slug != 'windows-aarch64'
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # protobuf publishes no native Windows/ARM64 build, so the ARM runner uses the
      # x64 protoc under emulation. Kept as a small retrying manual download.
      - name: Install protoc (Windows ARM, emulated x64)
        if: matrix.slug == 'windows-aarch64'
        shell: pwsh
        run: |
          $ver = "28.3"
          $url = "https://github.com/protocolbuffers/protobuf/releases/download/v$ver/protoc-$ver-win64.zip"
          $dest = "$env:RUNNER_TEMP\protoc.zip"
          for ($i = 1; $i -le 5; $i++) {
            try { Invoke-WebRequest -Uri $url -OutFile $dest; break }
            catch {
              if ($i -eq 5) { throw }
              Write-Host "protoc download failed (attempt $i): $($_.Exception.Message) - retrying in 10s"
              Start-Sleep -Seconds 10
            }
          }
          Expand-Archive $dest -DestinationPath "$env:RUNNER_TEMP\protoc" -Force
          "$env:RUNNER_TEMP\protoc\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build relay
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          if [ -n "$TARGET" ]; then
            cargo build --release --target "$TARGET"
            echo "BIN_DIR=target/$TARGET/release" >> "$GITHUB_ENV"
          else
            cargo build --release
            echo "BIN_DIR=target/release" >> "$GITHUB_ENV"
          fi

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          SLUG: ${{ matrix.slug }}
        run: |
          mkdir -p dist
          tar -czf "dist/axeno-relay-${SLUG}.tar.gz" -C "$BIN_DIR" axeno-relay

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          SLUG: ${{ matrix.slug }}
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path "$env:BIN_DIR/axeno-relay.exe" -DestinationPath "dist/axeno-relay-$env:SLUG.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: relay-${{ matrix.slug }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # Integrity + authenticity: a SHA256SUMS manifest signed with the relay
      # release key. setup-relay.* verify the signature against a pinned public
      # key before running the binary, so a tampered or swapped asset is caught
      # even if the GitHub release itself is compromised.
      - name: Generate and sign SHA256SUMS
        env:
          RELAY_SIGNING_KEY: ${{ secrets.RELAY_SIGNING_KEY }}
        run: |
          if [ -z "$RELAY_SIGNING_KEY" ]; then
            echo "::error::RELAY_SIGNING_KEY secret is not set; cannot sign release." >&2
            exit 1
          fi
          cd dist
          # Hash only the distributable archives, with bare filenames (no dist/ prefix).
          sha256sum axeno-relay-*.tar.gz axeno-relay-*.zip > SHA256SUMS
          printf '%s\n' "$RELAY_SIGNING_KEY" > "$RUNNER_TEMP/relay-release.key"
          openssl dgst -sha256 -sign "$RUNNER_TEMP/relay-release.key" \
            -out SHA256SUMS.sig SHA256SUMS
          rm -f "$RUNNER_TEMP/relay-release.key"
          echo "--- SHA256SUMS ---"; cat SHA256SUMS

      - name: Create the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          ls -la dist
          # Delete any existing release for this tag (keeping the git tag) so a
          # re-run starts from a clean asset list and never leaves renamed or
          # removed assets lingering. Then create fresh.
          if gh release view "$TAG" -R "$REPO" >/dev/null 2>&1; then
            gh release delete "$TAG" -R "$REPO" --yes
          fi
          gh release create "$TAG" -R "$REPO" --draft \
            --title "Axeno relay $TAG" \
            --notes "Relay binaries for $TAG. See README for setup." \
            dist/*
